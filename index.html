<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Pizza - Maubeuge</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

header {
  background: url('https://images.unsplash.com/photo-1601924582975-7e06e6d8b0b3') center/cover;
  padding: 100px 20px;
  text-align: center;
}

header h1 {
  font-size: 50px;
  color: #ff3c00;
}

header p {
  font-size: 20px;
}

.btn {
  background: #ff3c00;
  padding: 15px 25px;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

section {
  padding: 50px 20px;
  text-align: center;
}

.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.pizza {
  background: #222;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}

.pizza h3 {
  color: #ff3c00;
}

footer {
  background: #000;
  padding: 20px;
  text-align: center;
}
</style>

</head>

<body>

<header>
  <h1>🍕 Delivery Pizza</h1>
  <p>Les meilleures pizzas à Maubeuge</p>
  <button class="btn">Commander maintenant</button>
</header>

<section>
  <h2>Notre Menu</h2>
  <div class="menu">
    
    <div class="pizza">
      <h3>Margherita</h3>
      <p>Tomate, mozzarella</p>
      <p>8€</p>
    </div>

    <div class="pizza">
      <h3>Reine</h3>
      <p>Jambon, champignons</p>
      <p>10€</p>
    </div>

    <div class="pizza">
      <h3>4 Fromages</h3>
      <p>Mozzarella, chèvre, bleu</p>
      <p>11€</p>
    </div>

  </div>
</section>

<section>
  <h2>Contact</h2>
  <p>📍 Maubeuge</p>
  <p>📞 06 00 00 00 00</p>
</section>

<footer>
  <p>© 2026 Delivery Pizza</p>
</footer>

</body>
</html>
